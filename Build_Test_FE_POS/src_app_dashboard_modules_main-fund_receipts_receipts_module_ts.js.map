<h3 class="heading-text mb-3">Main Fund Current Amounts</h3>
<div class="main-fund-container gap-4 mb-4">
  <div class="main-fund-wrapper" *ngFor="let item of mainFundAmounts">
    <div class="main-fund-div">
      <div class="currency-symbol">
        <img [src]="item?.accountTypeImage" alt="">
      </div>
      <div class="d-flex flex-column">
        <h6 class="fw-700 font-18">{{item?.accountType[0]?.lookupName}}</h6>
        <h6 class="fw-700 font-20 gray-500 m-0">
          {{item?.remainingAmountTobeDistributed | number:'2.3-3'}}
        </h6>
      </div>
    </div>
  </div>
</div>
<h3 class="heading-text my-3">Receipt List</h3>
<form [formGroup]="filterForm">
  <div class="row mb-3">
    <div class="col-2">
      <input type="text" formControlName="search" class="form-control height-47" placeholder="Seach by Receipt ID or Amount" />
    </div>
    <!--<div class="col-2">
      <ng-select placeholder="Employee"
                 [items]="employeeList"
                 bindLabel="fullName" bindValue="userId"
                 formControlName="paidByUser">
      </ng-select>
    </div>-->
    <div class="col-2">
      <!--<ng-select placeholder="Account"
                 [items]="employeeList"
                 bindLabel="fullName" bindValue="userId"
                 formControlName="paidToUser">
      </ng-select>-->
      <ng-select placeholder="Search Account"
                 [items]="employeeList"
                 formControlName="paidToUser"
                 (search)="handleSearch($event)"
                 [searchFn]="customSearch"
                 bindLabel="customerName"
                 bindValue="customerId">
      </ng-select>
    </div>
    <div class="col-2">
      <ng-select placeholder="Main Fund Category"
                 [items]="mfCategoryList"
                 bindLabel="paymentCategoryName" bindValue="paymentCategoryID"
                 formControlName="mainFundCategory">
      </ng-select>
    </div>
    <div class="col-2">
      <ng-select placeholder="Cost Center"
                 [items]="costCenterList"
                 bindLabel="costCenterName" bindValue="costCenterId"
                 formControlName="costCenterId">
      </ng-select>
    </div>
    <div class="col-2">
      <div class="btns-group m-0">
        <a routerLink="/mainfund-receipt/create-receipt" class="btn btn-save">Create Receipt</a>
      </div>
    </div>
  </div>
</form>
<table-advanced [config]="tableConfig"
                [columns]="tableColumns"
                [data]="paymentList"
                [page]="pageNo"
                [total]="total"
                [limit]="limit"
                (sortUpdated)="onSortChange($event)"
                (pageUpdated)="onPageChange($event)">
  <ng-template libTableAdvancedColumn="action" let-row="row">
    <button type="button" class="redBtn" (click)="_commonService.downloadInvoices({ invoices: row?.mainFundPaymentVoucher})">View Receipt</button>
  </ng-template>

</table-advanced>
