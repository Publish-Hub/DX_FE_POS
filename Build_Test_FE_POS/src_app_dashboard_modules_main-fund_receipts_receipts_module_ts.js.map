<div class="page-layout">
  <form [formGroup]="formGroup">
    <div class="row">
      <div class="col-sm-3">
        <label class="input-label">Account Name</label>
        <!--<ng-select class="flex-grow-1 mt-3 mt-md-0" formControlName="accountID"
                   placeholder="Account Name" [items]="employeeList"
                   bindLabel="fullName" bindValue="userId">
        </ng-select>-->
        <ng-select placeholder="Search Account"
                   [items]="employeeList"
                   formControlName="accountID"
                   (search)="handleSearch($event)"
                   [searchFn]="customSearch"
                   bindLabel="customerName"
                   bindValue="customerId">
        </ng-select>
        <validation-error [control]="f.get('accountID')" [errorMessages]="{required:'Input is required'}"></validation-error>
      </div>
      <div class="col-sm-3">
        <label class="input-label">Account Number</label>
        <input type="text" class="form-control height-47" disabled [value]="f.get('accountID').value" />
      </div>
    </div>
    <div class="separator"></div>
    <div class="card-Box mt-4">
      <div class="row align-items-center">
        <div class="col-sm-2">
          <div class="input-label">Select Currency</div>
          <ng-select class="flex-grow-1 mt-3 mt-md-0" formControlName="paymentCurrencyID" (change)="handleCurrencyChange($event)"
                     placeholder="Currency" [items]="currencyList"
                     bindLabel="text" bindValue="value">
          </ng-select>
          <validation-error [control]="f.get('paymentCurrencyID')" [errorMessages]="{required:'Input is required'}"></validation-error>
        </div>
        <div class="col-sm-2">
          <label class="input-label">Select Payment Category</label>
          <ng-select class="flex-grow-1 mt-3 mt-md-0" formControlName="mainFundPaymentCategoryID"
                     placeholder="Main Fund Category" [items]="mfCategoryList" (change)="handleMfCategoryChange($event)"
                     bindLabel="paymentCategoryName" bindValue="paymentCategoryID">
          </ng-select>
          <validation-error [control]="f.get('mainFundPaymentCategoryID')" [errorMessages]="{required:'Input is required'}"></validation-error>
        </div>
        <div class="col-sm-2">
          <label class="input-label">Cost Center</label>
          <ng-select class="flex-grow-1 mt-3 mt-md-0" formControlName="paymentCostCenterID"
                     placeholder="Cost Center" [items]="costCenterList"
                     bindLabel="costCenterName" bindValue="costCenterId">
          </ng-select>
          <validation-error [control]="f.get('paymentCostCenterID')" [errorMessages]="{required:'Input is required'}"></validation-error>
        </div>
      </div>
    </div>
    <div class="card-Box mt-5">
      <div class="row">
        <div class="col-sm-8">
          <div class="row">
            <div class="col-3 mb-3">
              <label class="input-label">Amount* <ng-container *ngIf="currencyName">({{currencyName}})</ng-container></label>
              <input type="text" formControlName="paymentAmount" appDecimalNumber class="form-control height-47" (change)="handleAmountChange()" />
              <validation-error [control]="f.get('paymentAmount')" [errorMessages]="{required:'Input is required'}"></validation-error>
            </div>
            <div class="col-3 mb-3">
              <label class="input-label">Tax Amount <ng-container *ngIf="currencyName">({{currencyName}})</ng-container></label>
              <input type="text" class="form-control height-47" formControlName="paymentTaxAmount" />
              <validation-error [control]="f.get('paymentTaxAmount')" [errorMessages]="{required:'Input is required'}"></validation-error>
            </div>
            <div class="col-3 mb-3">
              <label class="input-label">Tax Percentage %</label>
              <!--<input type="text" class="form-control" formControlName="paymentTaxPer" />-->
              <ng-select class="flex-grow-1 mt-3 mt-md-0" formControlName="paymentTaxPer"
                         placeholder="Tax Percentage" [items]="taxesList" (change)="handleTaxChange($event)"
                         bindLabel="text" bindValue="id">
                <ng-template ng-option-tmp let-item="item">
                  {{item.text}}%
                </ng-template>
                <ng-template ng-label-tmp let-item="item">
                  <ng-container *ngIf="item?.text">
                    {{item.text}}%
                  </ng-container>
                </ng-template>
              </ng-select>
              <validation-error [control]="f.get('paymentTaxPer')" [errorMessages]="{required:'Input is required'}"></validation-error>
            </div>
            <div class="col-3 mb-3">
              <label class="input-label">Total Amount <ng-container *ngIf="currencyName">({{currencyName}})</ng-container></label>
              <input type="text" class="form-control height-47" appDecimalNumber formControlName="paymentTotalAmount" (change)="handleTotalAmountChange()" />
              <validation-error [control]="f.get('paymentTotalAmount')" [errorMessages]="{required:'Input is required'}"></validation-error>
            </div>
            <!--<div class="col-3 mb-3">
              <label class="input-label">Receipt Current Date</label>
              <input class="form-control" type="text" #datepickerYMD="bsDatepicker" formControlName="dateYMD" bsDatepicker [bsConfig]="{ dateInputFormat: 'YYYY-MM-DD' }">
            </div>
            <div class="col-3 mb-3">
              <label class="input-label">Receipt Current Time</label>
              <input class="form-control" type="time" formControlName="time">
            </div>-->
            <div class="col-12 mb-3">
              <label class="input-label">Notes</label>
              <input type="text" class="form-control" formControlName="notes" />
            </div>
          </div>
        </div>
        <div class="col-sm-4">
          <label class="input-label">Attachment</label>
          <div class="form-group mb-3">
            <div class="card-upload"
                 appImageDrag
                 (files)="filesDropped($event)"
                 (enter)="enter = !enter"
                 (leave)="enter = !enter"
                 accept=".png,.jpg,.jpeg,.pdf"
                 (click)="inputFile.click()">
              <div class="my-3">
                <img src="assets/images/upload.png" alt="" />
                <h5>Select OR Drag & drop files</h5>
                <p>Supported formates: JPEG, PNG, PDF</p>
              </div>
            </div>
            <input type="file" class="form-control" #inputFile accept=".png,.jpg,.jpeg,.pdf" (change)="onSelectFile($event)" multiple hidden />
          </div>
          <ng-container *ngIf="f.get('paymentAttachment')?.value">
            <div class="d-flex gap-3 file-item align-items-center justify-content-between">
              <label class="p-0">{{f.get('paymentAttachment')?.value}}</label>
              <div class="d-flex gap-2">
                <img height="20" class="cursor-pointer" src="assets/images/eye.png" (click)="fileAction('view')" />
                <img height="20" class="cursor-pointer" src="assets/images/trash.png" (click)="fileAction('delete')" />
              </div>
            </div>
          </ng-container>
          <small *ngIf="invalidFileType" class="text-danger">{{invalidFileType}}</small>
        </div>
      </div>
    </div>
  </form>
</div>
<div class="d-flex justify-content-end mt-5">
  <div class="btns-group my-2 mx-0">
    <button type="button" class="btn btn-cancel" routerLink="/mainfund-receipt">Cancel</button>
    <button type="button" (click)="handleSubmit()" class="btn btn-save">Save</button>
  </div>
</div>
<ng-template #container>
  <button type="button" class="redBtn">View Receipt</button>
</ng-template>
