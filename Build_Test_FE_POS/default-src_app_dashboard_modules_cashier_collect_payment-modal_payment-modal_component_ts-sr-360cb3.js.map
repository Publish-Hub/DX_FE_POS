<div class="modal-header">
  <h4 class="font-18 fw-600">{{(!data?.refund) && 'Confirm Payment' || 'Confirm Refund Payment'}}</h4>
</div>
<div class="modal-body">
  <p class="m-0 font-16 fw-600">{{(!data?.refund) && 'Do you want to continue?' || 'Are you sure you want to refund this payment?'}}</p>
  <ng-container *ngIf="data.collectionType == 7001 || data.collectionType == 7002 || data.collectionType == 7003">
    <p class="mt-2 font-14 fw-500">The remaining amount after this payment: {{data?.remainingAmount | number:'2.3-3'}} JOD</p>
  </ng-container>
</div>
<div class="modal-footer">
  <div class="btns-group">
    <button type="button" class="btn btn-save" (click)="_activeModal.close('close')">Yes</button>
    <!--<button type="button" class="btn btn-save" (click)="_activeModal.close('close')">Yes</button>-->
    <button type="button" class="btn btn-cancel" (click)="_activeModal.dismiss('dissmiss')">No</button>
  </div>
</div>
