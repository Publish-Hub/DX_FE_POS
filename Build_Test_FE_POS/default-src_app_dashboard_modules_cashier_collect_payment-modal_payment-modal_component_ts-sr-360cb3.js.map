<div class="tab-item">
  <div class="row">
    <!--{{pledgeArrControls.getRawValue()  | json}}-->
    <form [formGroup]="bankPledgeForm" (submit)="handleSubmit()">
      <div class="row">
        <div class="col-md-12">
          <div class="card-table">
            <div class="">
              <table class="table">
                <thead>
                  <tr>
                    <th>Pledge Amount*</th>
                    <th>Currency*</th>
                    <th>Bank Pledge Date*</th>
                    <th>Bank Name*</th>
                    <th width="15%">Bank Pledge<br /> Number*</th>
                    <th width="20%">Pledge Attachment</th>
                    <th>Action</th>
                  </tr>
                </thead>
                <tbody>
                  <ng-container formArrayName="pledgeArray" *ngFor="let item of pledgeArrControls?.controls;let i = index">
                    <tr [formGroupName]="i">
                      <td>
                        <div class="form-group">
                          <input type="number" class="form-control" placeholder="Amount" formControlName="pledgeAmountJod"
                                 (change)="sendAmount()" appDecimalNumber (input)="handleAmountFocus()">
                          <ng-container *ngIf="item?.get('pledgeAmountJod')?.errors">
                            <ng-container *ngIf="item?.get('pledgeAmountJod')?.invalid && item?.get('pledgeAmountJod')?.touched || item?.get('pledgeAmountJod')?.dirty">
                              <span class="error" *ngIf="item?.get('pledgeAmountJod')?.errors['required']">Input is required</span>
                              <span class="error" *ngIf="item?.get('pledgeAmountJod')?.errors['min']">Value must be greater than zero</span>
                            </ng-container>
                          </ng-container>
                        </div>
                      </td>
                      <td>
                        <div class="ngselect-curruncy form-group">
                          <ng-select placeholder="Currency" [items]="currencies"
                                     bindLabel="name" bindValue="lookupId" formControlName="currencyId">
                          </ng-select>
                          <ng-container *ngIf="item?.get('currencyId')?.errors">
                            <ng-container *ngIf="item?.get('currencyId')?.invalid && item?.get('currencyId')?.touched || item?.get('currencyId')?.dirty">
                              <span class="error" *ngIf="item?.get('currencyId')?.errors['required']">Input is required</span>
                            </ng-container>
                          </ng-container>
                        </div>
                      </td>
                      <td>
                        <div class="form-group">
                          <input type="date" class="form-control" formControlName="bankPledgeDate">
                          <ng-container *ngIf="item?.get('bankPledgeDate')?.errors">
                            <ng-container *ngIf="item?.get('bankPledgeDate')?.invalid && item?.get('bankPledgeDate')?.touched || item?.get('bankPledgeDate')?.dirty">
                              <span class="error" *ngIf="item?.get('bankPledgeDate')?.errors['required']">Input is required</span>
                            </ng-container>
                          </ng-container>
                        </div>
                      </td>
                      <td>
                        <div class="form-group">
                          <ng-select id="bankId" placeholder=" Select Bank " [items]="banks" bindLabel="name" bindValue="id"
                                     formControlName="bankId">
                          </ng-select>
                          <ng-container *ngIf="item?.get('bankId')?.errors">
                            <ng-container *ngIf="item?.get('bankId')?.invalid && item?.get('bankId')?.touched || item?.get('bankId')?.dirty">
                              <span class="error" *ngIf="item?.get('bankId')?.errors['required']">Input is required</span>
                            </ng-container>
                          </ng-container>
                        </div>
                      </td>
                      <td>
                        <div class="form-group">
                          <input type="text" class="form-control" formControlName="bankPledgeNumber">
                          <ng-container *ngIf="item?.get('bankPledgeNumber')?.errors">
                            <ng-container *ngIf="item?.get('bankPledgeNumber')?.invalid && item?.get('bankPledgeNumber')?.touched || item?.get('bankPledgeNumber')?.dirty">
                              <span class="error" *ngIf="item?.get('bankPledgeNumber')?.errors['required']">Input is required</span>
                              <span class="error" *ngIf="item?.get('bankPledgeNumber')?.errors['pattern']">Input allows only digits</span>
                            </ng-container>
                          </ng-container>
                        </div>
                      </td>
                      <td>
                        <div class="custom-file align-items-center" [class.disable-elm]="otherData.refund">
                          <input *ngIf="item.get('isNew').value"
                                 type="file" [id]="i+'file-input'"
                                 class="file-input__input"
                                 (change)="onFileChange($event,i)" />
                          <label class="file-input__label" [class.text-success]="item?.value.attachment" [attr.for]="i+'file-input'">{{item?.value.attachment && item?.value.attachment || 'Upload file'}}</label>
                          <ng-container *ngIf="item?.value.attachment">
                            <img height="20" class="cursor-pointer" src="assets/images/eye.png" (click)="fileAction(item?.value.attachment,i,'view')" />
                            <img height="20" class="cursor-pointer" src="assets/images/trash.png" (click)="fileAction(item?.value.attachment,i,'delete')" />
                          </ng-container>
                        </div>
                        <ng-container *ngIf="item?.get('attachment')?.errors">
                          <ng-container *ngIf="item?.get('attachment')?.invalid && item?.get('attachment')?.touched || item?.get('attachment')?.dirty">
                            <div class="form-group">
                              <span class="error" *ngIf="item?.get('attachment')?.errors['required']">Input is required</span>
                            </div>
                          </ng-container>
                        </ng-container>
                      </td>
                      <td>
                        <ng-container *ngIf="!otherData.refund">
                          <ng-container *ngIf="!otherData?.reverse;else reverseCase">
                            <img style="width:25px" class="cursor-pointer" src="assets/images/trash.png" (click)="removeItem(i)" alt="">
                          </ng-container>
                        </ng-container>
                        <!--Reverse Case Only Start-->
                        <ng-template #reverseCase>
                          <ng-container *ngIf="item.get('isNew').value;else reverseTemp">
                            <img style="width:25px" class="cursor-pointer" src="assets/images/trash.png" (click)="removeItem(i)" alt="">
                          </ng-container>
                          <ng-template #reverseTemp>
                            <ng-container *ngIf="!item.get('isReversed').value">
                              <i (click)="reverse(item,i)" class="cursor-pointer green-clr fas fa-rotate-left font-20"></i>
                            </ng-container>
                          </ng-template>
                        </ng-template>
                        <!--Reverse Case Only End-->
                      </td>
                    </tr>
                  </ng-container>
                </tbody>
              </table>
            </div>
          </div>
          <div class="col-md-12 d-flex mt-2" *ngIf="otherData?.reverse">
            <p class="blue-clr d-flex align-items-center fw-500 gap-1">
              <i class="fa-solid fa-circle-plus primary-clr fa-2x"></i>Press Tab to add new row
            </p>
          </div>
        </div>
      </div>
      <!-----------------------------------TABLE END HERE----------------------------->
      <div class="col-12 mb-4" *ngIf="otherData.collectionType == 7001 || otherData.collectionType == 7004 || otherData.collectionType == 7005 || otherData.collectionType == 7008 || otherData.collectionType == 7009 || (otherData.collectionType == 7002 && otherData.refund)">
        <label class="input-label">Cashier Notes</label>
        <textarea class="form-control" (change)="_subjectService.cashierNote.next($any($event).target.value)"></textarea>
      </div>
      <div class="col-md-12">
        <div class="btns-group my-2 me-0">
          <button type="button" class="btn btn-cancel" [disabled]="colllectedViaMachine" (click)="closeModal()">Cancel</button>
          <button type="submit" class="btn btn-save" [disabled]="isPending">
            {{isPending && 'Saving' || 'Confirm'}}
            <i *ngIf="isPending" class="fa-solid fa-circle-notch fa-spin"></i>
          </button>
        </div>
      </div>
    </form>
  </div>
</div>
