<div class="message" *ngIf="name == 'ok'">
  <h5>
    <i class="fa-regular fa-circle-check"></i>
    {{
      data?.reverse && 'Collection Successfully Updated' ||
      data?.refund && 'Refund Successfully Performed' ||
      'Your payment successfully completed'
    }}
  </h5>
  <div class="btns-group gap-2 my-0">
    <ng-container *ngIf="!data?.isMultiCollect">
      <!--Show inovice and receipt buttons in case of not multi collect-->
      <button *ngIf="(data?.collectionType !== 7001 && data?.collectionType !== 7002 && data?.collectionType !== 7003);else elseBlock"
              class="redBtn" (click)="downloadInvoices()">
        {{(data?.collectionType == 7004 || data?.collectionType == 7005 || data?.collectionType == 7008 || data?.collectionType == 7009) && 'View Receipt' || 'View Invoice'}}
      </button>
    </ng-container>
    <button class="redBtn" (click)="activeModal.close('Close click');navigateTo();emitData()">Close </button>
  </div>
  <ng-template #elseBlock>
    <!--For spareparts,services-->
    <ng-container *ngIf="!data?.reverse && !data?.refund">
      <a *ngIf="data.status == 10004 && data?.collectionType !== 7002" href="{{data?.invoice}}" target="_blank">
        <button type="button" class="redBtn">View Invoice</button>
      </a>
    </ng-container>
    <!--For spareparts,services,directpayment-->
    <a *ngIf="(data.status == 10004 || data.status == 10005) && (data?.invoiceType !== 'credit' && data?.invoiceType !== 'internal' && data?.invoiceType !== 'tmc')" href="{{data?.receipt}}" target="_blank">
      <button type="button" class="redBtn">View Receipt</button>
    </a>
  </ng-template>
</div>

<div class="message" *ngIf="name == 'no'">
  <h5 *ngFor=" let item of errors"> <i class="fa-regular fa-circle-xmark"></i> {{item.errorMessageEn ||item.ErrorMessageEn}} </h5>
  <button class="btn btnclose" (click)="activeModal.close('Close click');emitData()">Close </button>
</div>

<div class="message" *ngIf="name == 'remain'">
  <h5> <i class="fa-regular fa-circle-xmark"></i> Payment must be completed, there is an amount left to pay </h5>
  <button class="btn btnclose" (click)="activeModal.close('Close click');emitData()">Close </button>
</div>
