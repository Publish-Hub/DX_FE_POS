<div class="col-12 mb-4" *ngIf="otherData.collectionType == 7001 || otherData.collectionType == 7004 || otherData.collectionType == 7005">
  <label class="input-label">Cashier Notes</label>
  <textarea class="form-control" [(ngModel)]="cashierNotes"></textarea>
</div>
<div class="col-md-12" *ngIf="otherData?.invoiceType?.toLowerCase() == 'credit' ||
     otherData?.invoiceType?.toLowerCase() == 'internal' ||
     otherData?.invoiceType?.toLowerCase() == 'tmc'">
  <div class="btns-group my-2 me-0">
    <button type="button" class="btn btn-cancel" (click)="closeModal()">Cancel</button>
    <button type="submit" class="btn btn-save" *ngIf="!isPending" (click)="confirm()">Confirm</button>
    <saving-loader *ngIf="isPending"></saving-loader>
  </div>
</div>
