<div class="modal-header align-items-center justify-content-between">
  <h4 ngbAutoFocus class="modal-title font-20 fw-700">Terminal Providers Machine</h4>
</div>
<div class="modal-body">
  <div class="row">
    <div class="col-12">
      <label class="input-label">Plese select the POS machine through which you want to process the payment.</label>
      <ng-select placeholder="Select POS Machine"
                 [items]="data?.providerList"
                 bindLabel="machineName"
                 [formControl]="providerMachineID">
        <ng-template ng-label-tmp let-item="item">
          {{item?.machineName + ' - ' + item?.machineID}}
        </ng-template>
        <ng-template ng-option-tmp let-item="item">
          {{item?.machineName + ' - ' + item?.machineID}}
        </ng-template>
      </ng-select>
      <validation-error [control]="providerMachineID" [errorMessages]="{required:'Input is required'}"></validation-error>
    </div>
  </div>
</div>
<div class="modal-footer mt-3">
  <button type="button" class="redBtn" (click)="_activeModal.close()">Close</button>
  <button type="button" class="redBtn" (click)="handleConfirmClick()">Confirm</button>
</div>
