<div class="tab-item">
  <div class="row">
    <div class="col-md-12 text-end my-2">
      <button type="button" class="btn btn-trash" (click)="resetForm()">
        <img style="width:25px" src="assets/images/reload.png" alt="">
      </button>
    </div>
    <form [formGroup]="voucherForm" (submit)="handleSubmit()">
      <div class="row">
        <div class="col-md-12">
          <div class="card-table">
            <div class="">
              <table class="table">
                <thead>
                  <tr>
                    <th>Voucher Sequence*</th>
                    <th>Amount</th>
                    <th>Currency</th>
                    <th>Validity To</th>
                    <th>Brand</th>
                    <th>Campaign</th>
                    <th *ngIf="!otherData?.isMultiCollect">Action</th>
                  </tr>
                </thead>
                <tbody>
                  <ng-container formArrayName="voucherArray" *ngFor="let item of voucherArray?.controls;let i = index">
                    <tr [formGroupName]="i">
                      <td>
                        <div class="position-relative">
                          <input type="text" class="form-control" placeholder="Voucher Sequence" formControlName="voucherNumber"
                                 (change)="handleSearch($event,i)">
                          <i *ngIf="isLoading && searchIndex == i" class="fa-solid fa-circle-notch fa-spin fa-2x primary-clr search-loader"></i>
                        </div>
                        <ng-container *ngIf="item?.get('voucherNumber')?.errors">
                          <ng-container *ngIf="item?.get('voucherNumber')?.invalid && item?.get('voucherNumber')?.touched || item?.get('voucherNumber')?.dirty">
                            <span class="error" *ngIf="item?.get('voucherNumber')?.errors['required']">Input is required</span>
                          </ng-container>
                        </ng-container>
                      </td>
                      <td>
                        <input type="number" class="form-control" placeholder="Amount" formControlName="amountJod"
                               (change)="sendAmount()" appDecimalNumber (input)="handleAmountFocus()">
                        <small *ngIf="markaziaVoucher?.markaziaVAmount > otherData.grandAmount" class="primary-clr d-block">
                          Voucher Amount: {{markaziaVoucher?.markaziaVAmount | number:'2.3-3'}} JOD
                        </small>
                        <ng-container *ngIf="item?.get('amountJod')?.errors">
                          <ng-container *ngIf="item?.get('amountJod')?.invalid && item?.get('amountJod')?.touched || item?.get('amountJod')?.dirty">
                            <span class="error" *ngIf="item?.get('amountJod')?.errors['required']">Input is required</span>
                          </ng-container>
                        </ng-container>
                      </td>
                      <td>
                        <div class="ngselect-curruncy form-group">
                          <ng-select placeholder="Currency" [items]="currencies"
                                     bindLabel="name" bindValue="lookupId" formControlName="currencyId">
                          </ng-select>
                          <ng-container *ngIf="item.get('currencyId')?.errors">
                            <ng-container *ngIf="item?.get('currencyId')?.invalid && item?.get('currencyId')?.touched || item?.get('currencyId')?.dirty">
                              <span class="error" *ngIf="item?.get('currencyId')?.errors['required']">Input is required</span>
                            </ng-container>
                          </ng-container>
                        </div>
                      </td>
                      <td>
                        <input type="text" class="form-control" placeholder="Validiy To" formControlName="validityTo">
                      </td>
                      <td>
                        <input type="text" class="form-control" placeholder="Brand" formControlName="brand">
                      </td>
                      <td>
                        <input type="text" class="form-control" placeholder="Campaign" formControlName="campaign">
                      </td>
                      <td *ngIf="!otherData?.isMultiCollect">
                        <button type="button" class="btn btn-trash" (click)="removeItem(i)">
                          <img style="width:25px" src="assets/images/trash.png" alt="">
                        </button>
                      </td>
                    </tr>
                  </ng-container>
                </tbody>
              </table>
            </div>
          </div>
          <div class="col-md-12 d-flex mt-2" *ngIf="!otherData?.isMultiCollect">
            <p class="blue-clr d-flex align-items-center fw-500 gap-1">
              <i class="fa-solid fa-circle-plus primary-clr fa-2x"></i>Press Tab to add payment in another currency
            </p>
          </div>
        </div>
      </div>
      <!-----------------------------------TABLE END HERE----------------------------->
      <div class="col-12 mb-4" *ngIf="otherData.collectionType == 7001 || otherData.collectionType == 7004 || otherData.collectionType == 7005 || otherData.collectionType == 7008 || otherData.collectionType == 7009">
        <label class="input-label">Cashier Notes</label>
        <textarea class="form-control" (change)="_subjectService.cashierNote.next($any($event).target.value)"></textarea>
      </div>
      <div class="col-md-12">
        <div class="btns-group my-2 me-0">
          <button type="button" class="btn btn-cancel" (click)="closeModal()">Cancel</button>
          <button type="submit" class="btn btn-save" [disabled]="isPending">
            {{isPending && 'Saving' || 'Confirm'}}
            <i *ngIf="isPending" class="fa-solid fa-circle-notch fa-spin"></i>
          </button>
        </div>
      </div>
    </form>
  </div>
</div>
