<div class="card-page mt-3">
  <form [formGroup]="filterForm">
    <div class="row mb-3">
      <div class="col-md-3">
        <div class="input-group">
          <span class="input-group-text"><i class="light-gray fa-solid fa-search"></i></span>
          <input type="text" formControlName="replenishmentRequest" placeholder="Request No." numbersOnly
            class="form-control" />
          <span *ngIf="f.get('replenishmentRequest').value" (click)="f.get('replenishmentRequest').setValue('')"
            class="input-group-text cursor-pointer ">
            <i class="light-gray fa-solid fa-xmark"></i>
          </span>
        </div>
      </div>
      <div class="col-md-3">
        <div class="input-group">
          <span class="input-group-text"><i class="light-gray fa-solid fa-search"></i></span>
          <input type="text" formControlName="receipt" placeholder="Receipt" class="form-control" />
          <span *ngIf="f.get('receipt').value" (click)="f.get('receipt').setValue('')"
            class="input-group-text cursor-pointer ">
            <i class="light-gray fa-solid fa-xmark"></i>
          </span>
        </div>
      </div>
      <div class="col-md-3">
        <div class="input-group">
          <input type="text" formControlName="appDate" class="form-control" placeholder="Request Approval Date"
            bsDaterangepicker #adrp="bsDaterangepicker" placement="bottom"
            [bsConfig]="{ containerClass: 'theme-red',adaptivePosition: true,}" />
          <span (click)="adrp.toggle()" class="input-group-text cursor-pointer"><i
              class="light-gray fas fa-calendar"></i></span>
        </div>
      </div>
      <div class="col-md-3">
        <div class="input-group">
          <input type="text" formControlName="proDate" class="form-control" placeholder="Providing Date"
            bsDaterangepicker #pdrp="bsDaterangepicker" placement="bottom"
            [bsConfig]="{ containerClass: 'theme-red',adaptivePosition: true,}" />
          <span (click)="pdrp.toggle()" class="input-group-text cursor-pointer"><i
              class="light-gray fas fa-calendar"></i></span>
        </div>
      </div>
    </div>
  </form>
  <div class="row">
    <div class="col-12">
      <table-advanced [config]="tableConfig" [columns]="tableColumns" [data]="provideExpensesList" [page]="pageNo"
        [total]="total" [limit]="limit" (pageUpdated)="onPageChange($event)" (sortUpdated)="onSortChange($event)">
        <ng-template libTableAdvancedColumn="action" let-row="row">
          <div class="d-flex gap-2">
            <ng-container *ngIf="row?.provided">
              <ng-container *ngIf="!row?.voucherChecking">
                <a *ngIf="row?.voucherValid" [href]="row?.voucher" target="_blank" rel="noopener noreferrer">
                  <button type="button" class="redBtn">View Receipt</button>
                </a>

                <button *ngIf="!row?.voucherValid" type="button" class="redBtn" [disabled]="true"
                  title="Receipt not available or URL invalid">
                  View Receipt
                </button>
              </ng-container>

              <button type="button" (click)="viewDetails(row)" class="redBtn">View Details</button>

              <input type="file" hidden (change)="onFileChange($event, row)" accept=".jpeg,.jpg,.png,.pdf" #fileRef />
              <button type="button" class="redBtn" (click)="fileRef.click()">Upload Signed Receipt</button>
            </ng-container>

            <button *ngIf="!row?.provided" (click)="openModalTrigger(row)" class="redBtn">Provide</button>
          </div>
        </ng-template>

      </table-advanced>
    </div>
  </div>
</div>
