<form [formGroup]="filterForm">
  <div class="row mb-3">
    <div class="col-2">
      <input type="text" formControlName="id" class="form-control height-47" placeholder="Seach by ID / Sequence" />
    </div>
    <div class="col-2">
      <ng-select placeholder="Brand"
                 [items]="brandsList"
                 bindLabel="brand" bindValue="brandID"
                 formControlName="brandId">
      </ng-select>
    </div>
    <div class="col-2">
      <input type="text" formControlName="campaign" class="form-control height-47" placeholder="Campaign" />
    </div>
    <div class="col-2">
      <ng-select placeholder="Status"
                 [items]="statusList"
                 bindLabel="text" bindValue="id"
                 formControlName="status">
      </ng-select>
    </div>
    <div class="col-3">
      <div class="input-group position-relative">
        <input type="text"
               placeholder="Issuance Date"
               formControlName="date"
               class="form-control height-47"
               bsDaterangepicker
               #drp="bsDaterangepicker"
               [bsConfig]="{ containerClass: 'theme-red',isAnimated: true}">
        <i *ngIf="filterForm.get('date').value" class="fas fa-circle-xmark clearIcon" (click)="filterForm.get('date').setValue('')"></i>
        <span class="input-group-text" (click)="drp.toggle()"><i class="fa-regular fa-calendar-days font-24 primary-clr"></i></span>
      </div>
    </div>
  </div>
</form>
<div class="row">
  <div class="col-2">
    <div class="d-flex voucher align-items-center gap-3 p-2">
      <img height="40" src="/assets/images/voucher.svg" alt="voucher" />
      <p class="m-0 fw-600">Valid Vouchers {{vouchersInfo?.valid || 0}}</p>
    </div>
  </div>
  <div class="col-2">
    <div class="d-flex voucher align-items-center gap-3 p-2">
      <img height="40" src="/assets/images/voucher.svg" alt="voucher" />
      <p class="m-0 fw-600">Used Vouchers {{vouchersInfo?.used || 0}}</p>
    </div>
  </div>
  <div class="col-2">
    <div class="d-flex voucher align-items-center gap-3 p-2">
      <img height="40" src="/assets/images/voucher.svg" alt="voucher" />
      <p class="m-0 fw-600">Expired Vouchers {{vouchersInfo?.expired || 0}}</p>
    </div>
  </div>
  <div class="col-2">
    <button type="button" (click)="generateVoucher()" class="redBtn height-47 w-100">Generate New</button>
  </div>
  <div class="col-2">
    <button type="button" (click)="exportToExcel()" class="green redBtn d-flex align-items-center height-47">
      <i class="fa-solid fa-file-excel m-2 fa-2x"></i> Export To Excel
    </button>
  </div>
</div>


<table-advanced [config]="tableConfig"
                [columns]="tableColumns"
                [data]="vouchersList"
                [loading]="loading"
                [page]="pageNo"
                [total]="total"
                [limit]="limit"
                (sortUpdated)="onSortChange($event)"
                (pageUpdated)="onPageChange($event)">
  <ng-template libTableAdvancedColumn="validity" let-row="row">
    <div class="d-flex flex-column">
      <span>{{row?.markaziaVValidityFrom | date:'mediumDate'}}</span>
      <span>{{row?.markaziaVValidityTo | date:'mediumDate'}}</span>
    </div>
  </ng-template>
  <ng-template libTableAdvancedColumn="action" let-row="row">
    <ng-conainter [ngSwitch]="row.markaziaVStatus">
      <ng-container *ngSwitchCase="39001">
        <button class="redBtn" type="button" (click)="confirmDeleteVoucher(row?.markaziaVoucherID)">Delete</button>
      </ng-container>
      <ng-container *ngSwitchDefault>---</ng-container>
    </ng-conainter>
  </ng-template>

</table-advanced>
