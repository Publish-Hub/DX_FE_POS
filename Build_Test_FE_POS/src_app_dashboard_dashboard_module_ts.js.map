<div class="side-nav-content">
  <div class="register-open"
       *ngIf="hasOppendSession && sharedService.getRole?.roleId == 1">
    <p class="m-0 mb-2">
      Session Id <span> {{ sessionId }} </span>
    </p>
    <p class="m-0 mb-2">
      Opening At <span> {{ registerSessionCreatedAt | date : "short" }} </span>
    </p>
  </div>
  <!--<ul class="nav-list" [ngClass]="{ 'nav-list-open': sideNavStatus }">
    <ng-container *ngFor="let item of navList; let i = index">
      <ng-container *ngIf="item.type == sharedService.getRole?.roleId">
        <ng-container>
          <button class="nav-list-item"
                  (click)="onSelectMenu(i)"
                  [routerLink]="item.url"
                  routerLinkActive="active"
                  #rla="routerLinkActive">
            <img [src]="rla.isActive ? item.Icon2 : item.Icon" alt="" />
            <span> {{ item.Title }}</span>
          </button>
        </ng-container>
      </ng-container>
    </ng-container>
  </ul>-->
  <!--<ul class="nav-list" [ngClass]="{ 'nav-list-open': sideNavStatus }" *ngIf="sharedService.getRole?.roleId == 1"> Runs according to role cashier-->
  <!--below code display none-->
  <ul class="d-none nav-list d-flex flex-column gap-3" [ngClass]="{ 'nav-list-open': sideNavStatus }" *ngIf="sharedService.getRole?.roleId == 1">
    <ng-container *ngFor="let menu of userMenu; let i = index">
      <ng-container *ngIf="menu?.viewPermission">
        <div class="btn-group" dropdown>
          <button id="button-basic{{i}}" dropdownToggle type="button" class="btn dropdown-toggle" [attr.aria-controls]="'dropdown-basic' + i">
            <img src="/assets/images/navicon/dashboardIcon2.svg" />
            {{menu?.menuItem}}
            <img src="/assets/images/navicon/angel-down.svg" />
            <!--<span class="caret"></span>-->
          </button>
          <ul id="dropdown-basic{{i}}" *dropdownMenu class="dropdown-menu"
              role="menu" [attr.aria-labelledby]="'button-basic' + i">
            <ng-container *ngFor="let item of menu?.items; let j = index">
              <button [ngStyle]="!item.canClick && {'cursor':'default'} || {'cursor':'pointer'}"
                      class="nav-list-item"
                      (click)="onSelectMenuCashier(item?.title)"
                      [routerLink]="item.url"
                      routerLinkActive="active"
                      #rla="routerLinkActive"
                      [disabled]="!item.canClick"
                      [hidden]="!item.canView">
                <img [src]="rla.isActive ? item.icon2 : item.icon2" alt="" />
                <span> {{ item.title }} </span>
              </button>
            </ng-container>
          </ul>
        </div>
      </ng-container>
    </ng-container>
  </ul>
  <ul class="nav-list" [ngClass]="{ 'nav-list-open': sideNavStatus }">
    <ng-container *ngFor="let menu of userMenu; let i = index">
      <ng-container *ngIf="menu?.viewPermission">
        <div class="w-100">
          <div class="d-flex align-items-center justify-content-between my-3">
            <img src="/assets/images/navicon/dashboardIcon2.svg" />
            <h6 class="m-0 dark-gray font-18 fw-600">{{menu?.menuItem}}</h6>
            <img src="/assets/images/navicon/angel-down.svg" class="me-2" />
          </div>
          <!--<span class="caret"></span>-->
          <ul class="m-0 p-0 overflow-scroll-menu">
            <ng-container *ngFor="let item of menu?.items; let j = index">
              <button [ngStyle]="!item.canClick && {'cursor':'default'} || {'cursor':'pointer'}"
                      class="nav-list-item"
                      (click)="onSelectMenuCashier(item?.title)"
                      [routerLink]="item.url"
                      routerLinkActive="active"
                      [routerLinkActiveOptions]="{exact:(item?.menuItemId == 17) ? true: false}"
                      #rla="routerLinkActive"
                      [disabled]="!item.canClick"
                      [hidden]="!item.canView">
                <img [src]="rla.isActive ? item.icon2 : item.icon" alt="" />
                <span> {{ item.title }} </span>
              </button>
            </ng-container>
          </ul>
        </div>
      </ng-container>
    </ng-container>
  </ul>
  <!-- <a [ngClass]="{'a-active': val.IsActive ===true }">{{val.Title}}</a> -->

  <div *ngIf="sideNavStatus" class="col-xs-3">
    <ul class="ps-3" style="position: fixed; bottom: 0;">
      <li class="logout-btn align-items-center d-flex gap-2 justify-content-between dark-gray fw-700" style="cursor: pointer" (click)="logout()">
        <i class="fas fa-arrow-circle-left fa-2x primary-clr"></i>Back To Portal
      </li>
      <span class="primary-clr text-center font-14 fw-500">
        <!--Version VERSION_NUMBER-->
        Version 3.0.0
      </span>
    </ul>
  </div>
</div>
<!--<button routerLink="mainfund-receipt/create-receipt">asdfasdf</button>-->
