<nav class="navbar navbar-expand px-2">

  <a *ngIf="!iscollapse" (click)="mainPage()" class="navbar-brand px-1">
    <img width="105" height="17.5" src="assets/images/markazia.png" alt="">
  </a>
  <button (click)="SideNavToggle()" [style.margin-left.px]="[marginleft]" class="btn btn-danger btn-circle">
    <i class="fa-solid fa-arrow-left" *ngIf="!iscollapse"> </i> <i class="fa-solid fa-arrow-right" *ngIf="iscollapse"></i>
  </button>

  <div class="navbar-collapse px-3">
    <div *ngIf="showTitle" class="page-Tile">
      {{titleOfPage}} <span *ngIf="pagename"> > </span> {{pagename.slice(1)}}
    </div>
  </div>
  <!-- <span *ngIf="pagename"> > </span>  {{pagename.slice(1)}} -->
  <ul class="navbar-nav ms-auto d-flex flex-row align-items-center">
    <!-- <li *ngIf="showTitle" class="nav-item me-3 me-lg-0"></li> -->
    <!-- <li class="nav-item">
      <a class="nav-link">
        <span class="char-name"> {{firstName | slice:0:1 }}{{lastName | slice:0:1 }} </span> {{firstName}} {{lastName}}
      </a>
    </li> -->
    <li class="cursor-pointer">
      <div dropdown container="body" placement="left bottom">
        <i class="fas fa-bell font-24 position-relative"  dropdownToggle id="button-basic2" aria-controls="dropdown-basic2">
          <span class="notification-badge">{{notificationList.length}}</span>
        </i>
        <ul style="width:220px" id="dropdown-basic2" *dropdownMenu class="dropdown-menu-right dropdown-menu d-flex gap-1 flex-column p-2"
            role="menu" aria-labelledby="button-basic2">
          <li *ngFor="let item of notificationList" class="cursor-pointer" role="menuitem" (click)="redirectToOrder(item)">
            <div class="d-flex align-items-center gap-2">
              <h6 class="fw-500 m-0">{{item?.NotificationMessage}}</h6>
            </div>
          </li>
          <li *ngIf="!notificationList.length">No order for collection yet</li>
        </ul>
      </div>
    </li>

    <li class="cursor-pointer">
      <div dropdown container="body" placement="left bottom">
        <img src="/assets/images/navicon/grid.svg" dropdownToggle id="button-basic" aria-controls="dropdown-basic" />
        <ul style="width:220px" id="dropdown-basic" *dropdownMenu class="dropdown-menu-right dropdown-menu d-flex gap-4 flex-column p-2"
            role="menu" aria-labelledby="button-basic">
          <li *ngFor="let item of portalsList" class="cursor-pointer" role="menuitem">
            <div class="d-flex align-items-center gap-2" (click)="redirectTo(item?.description)">
              <img [src]="item?.imagePath" />
              <h6 class="fw-500 m-0">{{item?.translations}}</h6>
            </div>
          </li>
        </ul>
      </div>
    </li>
    <li class="nav-item dropdown">
      <a class="nav-link dropdown-toggle" href="#" role="button" data-bs-toggle="dropdown" aria-expanded="false">
        <span class="char-name"> {{firstName | slice:0:1 }}{{lastName | slice:0:1 }} </span> {{firstName}} {{lastName}}
      </a>
      <ul class="dropdown-menu">
        <li><a class="dropdown-item" routerLink="/profile">My Profile</a></li>
      </ul>
    </li>

  </ul>
</nav>
